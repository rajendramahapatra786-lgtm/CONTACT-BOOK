<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Contact Management System</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

    <header>
        <h1> Contact Management System</h1>
    </header>

    <section class="stats">
        <div>
            <h3 id="totalCount">0</h3>
            <p>Total Contacts</p>
        </div>
    </section>

    <main class="container">
        <section class="list-section">
            <div class="list-header">
                <h2>Contacts</h2>
                <div class="search-box">

                    <input type="text" id="search" placeholder="Search by name, phone, email">

                    <button id="voiceSearch">🎤</button>

                </div>


                <select id="filterCategory">
                    <option value="">All Categories</option>
                    <option value="Family">Family</option>
                    <option value="Friends">Friends</option>
                    <option value="Work">Work</option>
                    <option value="Emergency">Emergency</option>
                </select>

            </div>
            <div id="contactList"></div>
        </section>
    </main>

    <!-- Slide-in Form -->
    <div id="overlay" class="overlay"></div>
    <section class="form-section" id="formSection">
        <div class="form-header">

            <h2>Add / Update Contact</h2>

            <button type="button" class="close-btn" onclick="UI.toggleForm()">
                ✕
            </button>

        </div>
        <form id="contactForm">
            <input type="text" id="name" placeholder="Full Name" required>
            <input type="tel" id="phone" placeholder="Phone (10 digits)" maxlength="10" inputmode="numeric" required>
            <input type="email" id="email" placeholder="Email" required>

            <select id="category" required>
                <option value="">Select Category</option>
                <option value="Family">Family</option>
                <option value="Friends">Friends</option>
                <option value="Work">Work</option>
                <option value="Emergency">Emergency</option>
            </select>

            <input type="file" id="profileImage" accept="image/*">
            <button type="submit">Save Contact</button>
        </form>
    </section>
    <footer>Created by <span>Rajendra</span></footer>

    <!-- Floating Action Button -->
    <button class="fab" onclick="UI.toggleForm()">＋</button>

    <!-- Theme Toggle Buttons -->
    <div class="theme-toggle">
        <button id="darkToggle">🌙</button>
        <button id="rgbToggle">🎛️</button>
    </div>
    <div id="toast"></div>


    <script src="assets/js/storage.js"></script>
    <script src="assets/js/validation.js"></script>
    <script src="assets/js/ui.js"></script>
    <script src="assets/js/app.js"></script>
</body>

</html>
